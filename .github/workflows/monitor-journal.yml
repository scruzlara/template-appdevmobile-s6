name: Surveillance du journal — Dispositif évaluation

# Se déclenche uniquement quand journal/speckit-log.md est modifié.
on:
  push:
    branches: [main]
    paths:
      - 'journal/speckit-log.md'

jobs:
  check-journal-integrity:
    name: Vérifier l'intégrité du journal
    runs-on: ubuntu-latest
    steps:
      - name: Contrôler l'origine de la modification
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          BEFORE="${{ github.event.before }}"

          # Ignorer le tout premier commit du dépôt (initialisation)
          if [[ "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
            echo "Premier commit — initialisation du dépôt, contrôle ignoré."
            exit 0
          fi

          echo "Commit  : ${{ github.sha }}"
          echo "Message : $COMMIT_MSG"
          echo "Auteur  : ${{ github.event.head_commit.author.name }}"

          if [[ "$COMMIT_MSG" =~ ^\[speckit: ]]; then
            echo "✓ Modification conforme — commit agent speckit détecté."
          else
            echo ""
            echo "════════════════════════════════════════════════════"
            echo "⚠️  ALERTE — MODIFICATION MANUELLE DU JOURNAL"
            echo "════════════════════════════════════════════════════"
            echo "journal/speckit-log.md a été modifié dans un commit"
            echo "dont le message ne correspond pas au pattern [speckit:*]."
            echo ""
            echo "Commit  : ${{ github.sha }}"
            echo "Message : $COMMIT_MSG"
            echo "Auteur  : ${{ github.event.head_commit.author.name }}"
            echo "Date    : ${{ github.event.head_commit.timestamp }}"
            echo ""
            echo "Ce commit est enregistré dans l'historique Git et sera"
            echo "examiné lors de l'oral de soutenance."
            echo "════════════════════════════════════════════════════"
            exit 1
          fi
