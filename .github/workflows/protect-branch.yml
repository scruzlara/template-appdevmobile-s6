name: Protection de branche — Dispositif évaluation

on:
  push:
    branches: [main]

jobs:
  protect-main:
    name: Activer la protection de main
    runs-on: ubuntu-latest
    if: github.repository_owner == 'IUTNancyCharlemagne'
    steps:
      - name: Vérifier et activer la protection de branche
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.EVAL_PROTECT_TOKEN }}
          script: |
            // Si le token est absent (dépôt template hors organisation), sortir proprement
            if (!process.env.EVAL_PROTECT_TOKEN && '${{ secrets.EVAL_PROTECT_TOKEN }}' === '') {
              console.log('Token absent — dépôt template, aucune action requise.');
              return;
            }

            // Vérifier si la protection est déjà active
            try {
              await github.rest.repos.getBranchProtection({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                branch: 'main',
              });
              console.log('✓ Protection déjà active sur main — aucune action requise.');
              return;
            } catch (error) {
              if (error.status !== 404) throw error;
              // 404 = pas encore de protection, on continue
            }

            // Activer la protection
            await github.rest.repos.updateBranchProtection({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              branch: 'main',
              required_status_checks: null,
              enforce_admins: false,
              required_pull_request_reviews: null,
              restrictions: null,
              allow_force_pushes: false,
              allow_deletions: false,
              lock_branch: false,
            });
            console.log('✓ Protection activée sur main.');
            console.log('  - Force-push : interdit');
            console.log('  - Suppression de branche : interdite');
        env:
          EVAL_PROTECT_TOKEN: ${{ secrets.EVAL_PROTECT_TOKEN }}
