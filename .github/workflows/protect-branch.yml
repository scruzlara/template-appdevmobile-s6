name: Protection de branche — Dispositif évaluation

# Se déclenche à chaque push sur main.
# L'appel API est idempotent : relancer le workflow ne change rien si la
# protection est déjà en place.
on:
  push:
    branches: [main]

jobs:
  protect-main:
    name: Activer la protection de main
    runs-on: ubuntu-latest
    # Ne s'exécute que si le secret est disponible (dépôts étudiants dans l'org).
    # Sur le template repo (compte personnel), le secret est absent : le job est ignoré.
    if: ${{ secrets.EVAL_PROTECT_TOKEN != '' }}
    steps:
      - name: Protéger la branche main (interdire le force-push et la suppression)
        uses: actions/github-script@v7
        with:
          # EVAL_PROTECT_TOKEN : PAT avec scope "repo", stocké comme secret
          # d'organisation dans IUTNancyCharlemagne.
          # Voir SETUP-ENSEIGNANT.md pour la procédure de création.
          github-token: ${{ secrets.EVAL_PROTECT_TOKEN }}
          script: |
            await github.rest.repos.updateBranchProtection({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              branch: 'main',
              required_status_checks: null,
              enforce_admins: false,
              required_pull_request_reviews: null,
              restrictions: null,
              allow_force_pushes: false,
              allow_deletions: false,
              lock_branch: false,
            });
            console.log('✓ Branch protection activée sur main');
            console.log('  - Force-push : interdit');
            console.log('  - Suppression de branche : interdite');
